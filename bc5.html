<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BackHub - Live Wallpapers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow-x:hidden;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:#111;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
}

.search-box input{
width:350px;
padding:12px;
border:none;
outline:none;
border-radius:30px;
background:#222;
color:white;
font-size:16px;
}

.upload-btn{
background:#6c5ce7;
border:none;
color:white;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

.upload-btn:hover{
background:#5849d6;
}

.featured{
height:300px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(
90deg,
#111,
#1c1c1c,
#111
);
}

.hero-content h1{
font-size:80px;
margin-bottom:10px;
}

.hero-content p{
font-size:30px;
color:#ddd;
}

.categories{
display:flex;
justify-content:center;
gap:12px;
padding:25px;
flex-wrap:wrap;
}

.categories button{
background:#222;
border:none;
color:white;
padding:12px 20px;
border-radius:25px;
cursor:pointer;
transition:.3s;
}

.categories button:hover{
background:#444;
}

#featuredPreview{
display:none;
padding:30px;
gap:30px;
align-items:flex-start;
}

#featuredImage,
#featuredVideo{
width:70%;
border-radius:15px;
max-height:600px;
object-fit:contain;
background:black;
}

#topicPanel{
width:30%;
display:flex;
flex-direction:column;
gap:10px;
}

.topic-tag{
padding:12px;
background:#222;
border-radius:10px;
}

.gallery{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
position:relative;
overflow:hidden;
border-radius:12px;
background:#111;
}

.card img,
.card video{
width:100%;
height:220px;
object-fit:cover;
cursor:pointer;
transition:.3s;
display:block;
}

.card:hover img,
.card:hover video{
transform:scale(1.05);
}

.overlay{
position:absolute;
bottom:0;
left:0;
width:100%;
padding:15px;
background:linear-gradient(
transparent,
rgba(0,0,0,.95)
);
opacity:0;
transition:.3s;
}

.card:hover .overlay{
opacity:1;
}

.actions{
display:flex;
justify-content:space-between;
align-items:center;
}

.download-btn{
background:#444;
padding:8px 12px;
color:white;
text-decoration:none;
border-radius:6px;
}

.delete-btn{
background:red;
border:none;
padding:8px 12px;
color:white;
border-radius:6px;
cursor:pointer;
}

.empty{
text-align:center;
padding:80px;
color:#888;
font-size:22px;
}

.modal{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
z-index:500;
}

.modal-content{
width:500px;
max-width:90%;
background:#1a1a1a;
margin:80px auto;
padding:25px;
border-radius:15px;
}

.modal-content h2{
margin-bottom:20px;
}

.modal-content input[type=file]{
width:100%;
margin-bottom:20px;
}

.topic-list{
display:grid;
grid-template-columns:
repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.topic-list label{
background:#222;
padding:10px;
border-radius:8px;
cursor:pointer;
display:flex;
align-items:center;
gap:10px;
}

.modal-content button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-size:16px;
}

.upload-confirm{
background:#6c5ce7;
color:white;
}

.close-upload{
background:#444;
color:white;
}

.viewer{
display:none;
position:fixed;
inset:0;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.9);
backdrop-filter:blur(10px);
z-index:9999;
}

.viewer img,
.viewer video{
max-width:90%;
max-height:90%;
border-radius:15px;
}

.close-btn{
position:absolute;
top:20px;
right:40px;
font-size:40px;
cursor:pointer;
color:white;
}

@media(max-width:900px){

header{
flex-direction:column;
gap:15px;
}

.search-box input{
width:100%;
}

.hero-content h1{
font-size:50px;
}

.hero-content p{
font-size:20px;
}

#featuredPreview{
flex-direction:column;
}

#featuredImage,
#featuredVideo{
width:100%;
}

#topicPanel{
width:100%;
}

}

</style>

</head>

<body>

<header>

  <div class="logo">BackHub</div>

  <div class="search-box">
    <input
      type="text"
      id="searchInput"
      placeholder="Search wallpapers..."
      onkeyup="searchWallpaper()">
  </div>

  <button class="upload-btn" onclick="openModal()">Upload</button>

</header>

<section class="featured">
  <div class="hero-content">
    <h1>Live Wallpapers</h1>
    <p>4K • Anime • Nature • Gaming</p>
  </div>
</section>

<section class="categories">
  <button onclick="filterTopic('All')">All</button>
  <button onclick="filterTopic('Anime')">Anime</button>
  <button onclick="filterTopic('Nature')">Nature</button>
  <button onclick="filterTopic('Gaming')">Gaming</button>
  <button onclick="filterTopic('Dark')">Dark</button>
  <button onclick="filterTopic('Album Cover')">Album Cover</button>
</section>

<section id="featuredPreview">

  <img id="featuredImage" style="display:none;">

  <video
    id="featuredVideo"
    controls
    loop
    style="display:none;">
  </video>

  <div id="topicPanel"></div>

</section>

<section class="gallery" id="gallery"></section>

<div class="empty" id="emptyText">Chưa có hình nền nào</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Upload Wallpaper</h2>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <h3>Chọn chủ đề</h3>
    <div class="topic-list">
      <label><input type="checkbox" value="Anime"> Anime</label>
      <label><input type="checkbox" value="Nature"> Nature</label>
      <label><input type="checkbox" value="Gaming"> Gaming</label>
      <label><input type="checkbox" value="Dark"> Dark</label>
      <label><input type="checkbox" value="Album Cover"> Album Cover</label>
      <label><input type="checkbox" value="Sci-Fi"> Sci-Fi</label>
    </div>
    <button class="upload-confirm" onclick="uploadFile()">Upload</button>
    <button class="close-upload" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="viewer" id="viewer">
  <span class="close-btn" onclick="closeViewer()">×</span>
  <img id="viewerImg" style="display:none;">
  <video id="viewerVideo" controls loop style="display:none;"></video>
</div>

<script>

// ── Modal ──────────────────────────────────────────────

function openModal(){
  document.getElementById("modal").style.display = "block";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

// ── Upload ────────────────────────────────────────────
// FIX 1: dùng data-* attributes + addEventListener thay vì inline
//        onclick string → tránh vỡ cú pháp khi tên file có dấu nháy
// FIX 2: cảnh báo khi upload mà không chọn topic

function uploadFile(){

  const file = document.getElementById("fileInput").files[0];

  if(!file){
    alert("Vui lòng chọn file");
    return;
  }

  const topics = [];
  document
    .querySelectorAll(".topic-list input:checked")
    .forEach(box => topics.push(box.value));

  // FIX 2: cảnh báo nếu không chọn topic
  if(topics.length === 0){
    alert("Vui lòng chọn ít nhất một chủ đề để ảnh hiển thị đúng khi lọc.");
    return;
  }

  const url = URL.createObjectURL(file);
  const gallery = document.getElementById("gallery");
  document.getElementById("emptyText").style.display = "none";

  const card = document.createElement("div");
  card.className = "card";

  if(file.type.startsWith("image")){

    const img = document.createElement("img");
    img.src = url;
    // FIX 1: lưu metadata vào data-* thay vì nhúng vào onclick string
    img.dataset.name   = file.name;
    img.dataset.topics = topics.join(",");
    img.dataset.type   = "image";
    img.dataset.url    = url;

    const overlay = buildOverlay(url, file.name);
    card.appendChild(img);
    card.appendChild(overlay);

  } else if(file.type.startsWith("video")){

    const video = document.createElement("video");
    video.src      = url;
    video.muted    = true;
    video.autoplay = true;
    video.loop     = true;
    // FIX 1: lưu metadata vào data-*
    video.dataset.name   = file.name;
    video.dataset.topics = topics.join(",");
    video.dataset.type   = "video";
    video.dataset.url    = url;

    const overlay = buildOverlay(url, file.name);
    card.appendChild(video);
    card.appendChild(overlay);

  }

  // FIX 1: gắn sự kiện click bằng addEventListener thay vì inline string
  const media = card.querySelector("img, video");
  media.addEventListener("click", function(){
    const t = this.dataset.type;
    selectFeatured(this.dataset.url, t, this.dataset.name, this.dataset.topics);
    openViewer(this.dataset.url, t);
  });

  gallery.prepend(card);
  closeModal();

  // reset form
  document.getElementById("fileInput").value = "";
  document
    .querySelectorAll(".topic-list input")
    .forEach(box => box.checked = false);
}

// helper tạo overlay
function buildOverlay(url, name){
  const overlay = document.createElement("div");
  overlay.className = "overlay";

  const actions = document.createElement("div");
  actions.className = "actions";

  const dlBtn = document.createElement("a");
  dlBtn.href         = url;
  dlBtn.download     = name;
  dlBtn.className    = "download-btn";
  dlBtn.textContent  = "Download";

  const delBtn = document.createElement("button");
  delBtn.className   = "delete-btn";
  delBtn.textContent = "Delete";
  delBtn.addEventListener("click", function(e){
    e.stopPropagation();
    deleteCard(this);
  });

  actions.appendChild(dlBtn);
  actions.appendChild(delBtn);
  overlay.appendChild(actions);
  return overlay;
}

// ── Featured preview ───────────────────────────────────

function selectFeatured(src, type, title, topics){

  document.getElementById("featuredPreview").style.display = "flex";

  const img   = document.getElementById("featuredImage");
  const video = document.getElementById("featuredVideo");

  if(type === "image"){
    img.style.display   = "block";
    video.style.display = "none";
    img.src = src;
  } else {
    img.style.display   = "none";
    video.style.display = "block";
    video.src = src;
    video.play();
  }

  const panel = document.getElementById("topicPanel");
  panel.innerHTML = "";

  topics.split(",").forEach(topic => {
    if(topic.trim() === "") return;
    const tag = document.createElement("div");
    tag.className   = "topic-tag";
    tag.textContent = topic;
    panel.appendChild(tag);
  });
}

// ── Viewer ─────────────────────────────────────────────

function openViewer(src, type){

  const viewer = document.getElementById("viewer");
  const img    = document.getElementById("viewerImg");
  const video  = document.getElementById("viewerVideo");

  viewer.style.display = "flex";

  if(type === "image"){
    img.style.display   = "block";
    video.style.display = "none";
    img.src = src;
  } else {
    img.style.display   = "none";
    video.style.display = "block";
    video.src = src;
    video.play();
  }
}

function closeViewer(){
  document.getElementById("viewer").style.display = "none";
  const video = document.getElementById("viewerVideo");
  video.pause();
  video.currentTime = 0;
  // FIX 5: xóa src để tránh tiếp tục phát ngầm
  video.src = "";
}

// ── Delete ─────────────────────────────────────────────
// FIX 6: giải phóng blob URL và reset featuredPreview đúng cách

function deleteCard(btn){

  const card  = btn.closest(".card");
  const media = card.querySelector("img, video");

  // giải phóng blob URL để tránh rò rỉ bộ nhớ
  if(media && media.dataset.url){
    URL.revokeObjectURL(media.dataset.url);
  }

  card.remove();

  const remaining = document.querySelectorAll(".card");

  if(remaining.length === 0){
    document.getElementById("emptyText").style.display = "block";

    // ẩn featuredPreview và xóa src để giải phóng bộ nhớ
    document.getElementById("featuredPreview").style.display = "none";
    const fImg   = document.getElementById("featuredImage");
    const fVideo = document.getElementById("featuredVideo");
    fImg.src   = "";
    fVideo.src = "";
    fVideo.pause();
    document.getElementById("topicPanel").innerHTML = "";
  }
}

// ── Filter ─────────────────────────────────────────────

function filterTopic(topic){
  document.querySelectorAll(".card").forEach(card => {
    const media  = card.querySelector("img, video");
    // FIX 3: dùng || "" để tránh undefined
    const topics = media.dataset.topics || "";

    card.style.display =
      (topic === "All" || topics.includes(topic))
        ? "block"
        : "none";
  });
}

// ── Search ─────────────────────────────────────────────
// FIX 2 (search): dùng || "" để tránh TypeError khi topics undefined

function searchWallpaper(){
  const keyword = document
    .getElementById("searchInput")
    .value
    .toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    const media  = card.querySelector("img, video");
    const name   = (media.dataset.name   || "").toLowerCase();
    // FIX 2: guard || "" tránh crash
    const topics = (media.dataset.topics || "").toLowerCase();

    card.style.display =
      (name.includes(keyword) || topics.includes(keyword))
        ? "block"
        : "none";
  });
}

// ── Đóng khi click ngoài hoặc nhấn Escape ─────────────

window.onclick = function(event){
  const modal  = document.getElementById("modal");
  const viewer = document.getElementById("viewer");
  if(event.target === modal)  closeModal();
  if(event.target === viewer) closeViewer();
};

document.addEventListener("keydown", function(event){
  if(event.key === "Escape"){
    closeModal();
    closeViewer();
  }
});

</script>

</body>
</html>
